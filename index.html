<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Colombo Court Hotel & Spa — Marketing Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#080810;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(200,16,46,.12),transparent);pointer-events:none;}
.card{background:#14141f;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.55);}
.logo-wrap{text-align:center;margin-bottom:28px;}
.logo-mark{width:52px;height:52px;background:#C8102E;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;margin:0 auto 12px;box-shadow:0 4px 20px rgba(200,16,46,.4);}
.hotel-name{font-size:16px;font-weight:600;color:#f0ede8;line-height:1.3;}
.dept{font-size:8.5px;color:#C8102E;letter-spacing:2.5px;text-transform:uppercase;margin-top:3px;}
.exp-notice{background:rgba(200,16,46,.1);border:1px solid rgba(200,16,46,.25);border-radius:7px;padding:9px 13px;font-size:11.5px;color:#e8304a;margin-bottom:18px;display:none;}
.fr{margin-bottom:16px;}
.fr label{display:block;font-size:10px;font-weight:500;color:#8a8682;margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase;}
.fr input{width:100%;padding:10px 13px;background:#07070e;border:1px solid rgba(255,255,255,.08);border-radius:7px;font-size:13px;font-family:'Poppins',sans-serif;color:#f0ede8;outline:none;transition:border .14s;}
.fr input:focus{border-color:#C8102E;background:rgba(200,16,46,.03);}
.fr input::placeholder{color:#48464a;}
.err{background:rgba(224,68,68,.1);border:1px solid rgba(224,68,68,.22);border-radius:7px;padding:9px 13px;font-size:12px;color:#e04444;margin-bottom:14px;display:none;}
.btn-login{width:100%;padding:12px;background:#C8102E;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .14s;margin-top:4px;}
.btn-login:hover{background:#e8304a;box-shadow:0 4px 16px rgba(200,16,46,.4);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}
.credit{text-align:center;font-size:10px;color:#48464a;margin-top:20px;letter-spacing:.3px;}
.credit span{color:rgba(200,16,46,.5);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark">CC</div>
    <div class="hotel-name">Colombo Court Hotel &amp; Spa</div>
    <div class="dept">Marketing Hub</div>
  </div>
  <div class="exp-notice" id="exp-notice">⏱ Your session expired after 24 hours. Please sign in again.</div>
  <div class="err" id="err-msg"></div>
  <div class="fr"><label>Username</label><input type="text" id="username" placeholder="Enter username" autocomplete="username"></div>
  <div class="fr"><label>Password</label><input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
  <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
  <div class="credit">Created by <span>Shazwan Yoonus</span></div>
</div>
<script src="js/app.js"></script>
<script>
// Show expired notice
if(location.search.includes('expired=1')){
  document.getElementById('exp-notice').style.display='block';
}
// Redirect if already logged in
const s=getSession();
if(s?.token){ const rem=24*3600000-(Date.now()-(s.created_at||0)); if(rem>0) window.location.href='pages/dashboard.html'; }

async function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const err=document.getElementById('err-msg');
  const btn=document.getElementById('login-btn');
  if(!u||!p){err.style.display='block';err.textContent='Please enter username and password.';return;}
  btn.disabled=true;btn.textContent='Signing in…';
  err.style.display='none';
  try{
    const r=await api('GET',{action:'login',username:u,password:p});
    saveSession({token:r.token,username:r.user.username,role:r.user.role});
    window.location.href='pages/dashboard.html';
  }catch(e){
    err.style.display='block';
    err.textContent=e.message==='Unauthorized'?'Incorrect username or password.':'Login failed: '+e.message;
    btn.disabled=false;btn.textContent='Sign In';
  }
}
</script>
</body>
</html>
